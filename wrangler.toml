name = "github-digest"
main = "index.js"
compatibility_date = "2026-05-23"

[observability]
enabled = true
head_sampling_rate = 1

[secrets]
required = ["GITHUB_TOKEN", "DEEPSEEK_API_KEY", "RUN_SECRET"]

[[routes]]
pattern = "digest.khaiise.com"
custom_domain = true

[triggers]
# Cloudflare Cron 使用 UTC。04:00 UTC = 12:00 Asia/Hong_Kong
crons = ["0 4 * * *"]

[vars]
EMAIL_FROM = "digest@khaiise.com"
EMAIL_TO = "abc1275132155@163.com,317770557@qq.com"
REPORT_TIMEZONE = "Asia/Hong_Kong"
MAX_PROJECTS = "15"
GITHUB_SEARCH_PAGES = "2"
DEEPSEEK_MODEL = "deepseek-reasoner"
DIGEST_OVERVIEW_MODEL = "deepseek-reasoner"
PROJECT_SUMMARY_MODEL = "deepseek-reasoner"
REPEAT_COOLDOWN_DAYS = "5"
REPEAT_WINDOW_DAYS = "14"
BREAKOUT_STAR_DELTA = "120"
JUYA_RSS_URL = "https://imjuya.github.io/juya-ai-daily/rss.xml"
JUYA_CONTENT_LIMIT = "30000"
ALLOW_QUERY_RUN_SECRET = "true"

[[kv_namespaces]]
binding = "STATE"
id = "edfa110c038b4e76b4653befd3fb0a09"

[[queues.producers]]
binding = "DIGEST_QUEUE"
queue = "github-digest-jobs"

[[queues.consumers]]
queue = "github-digest-jobs"
max_batch_size = 1
max_batch_timeout = 2
max_retries = 0

[[send_email]]
name = "EMAIL_OUT"
allowed_destination_addresses = ["abc1275132155@163.com", "317770557@qq.com"]
allowed_sender_addresses = ["digest@khaiise.com"]
